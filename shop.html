<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop VYRO</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/shop.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="loader"><div class="loader-mark">VYRO</div></div>
  <header class="navbar"><a class="logo" href="index.html"><img src="images/webp/vyro-logo-nav.webp" alt="VYRO" width="300" height="156" decoding="async"></a><nav class="nav-links"><a href="index.html">Home</a><a href="shop.html">Shop</a><a href="about.html">About</a><a href="contact.html">Contact</a></nav><div class="nav-actions"><a class="icon-btn" href="dashboard.html"><i class="fa-regular fa-user"></i></a><button class="icon-btn cart-toggle"><i class="fa-solid fa-bag-shopping"></i><span class="cart-count">0</span></button><button class="icon-btn menu-toggle"><i class="fa-solid fa-bars"></i></button></div></header>
  <main>
    <section class="page-hero section-pad">
      <div class="container"><span class="eyebrow">Shop</span><h1>Premium energy for every kind of day.</h1><p>Explore bright VYRO cans, variety packs, and limited launch drops.</p></div>
    </section>
    <section class="shop-shell section-pad">
      <div class="container shop-toolbar">
        <div class="shop-search"><i class="fa-solid fa-magnifying-glass"></i><input id="productSearch" type="search" placeholder="Search flavor or benefit"></div>
        <div class="tabs" data-filter-tabs><button class="active" data-category="all">All</button><button data-category="core">Core</button><button data-category="zero">Zero Sugar</button><button data-category="limited">Limited</button></div>
        <select id="sortProducts"><option value="featured">Featured</option><option value="price-low">Price Low</option><option value="price-high">Price High</option></select>
      </div>
      <div class="container product-grid" id="productGrid"></div>
    </section>
  </main>
  <div class="quick-view" id="quickView"><div class="quick-card"><button class="quick-close"><i class="fa-solid fa-xmark"></i></button><div id="quickContent"></div></div></div>
  <footer class="footer"><div class="container footer-grid"><div><a class="logo" href="index.html"><img src="images/webp/vyro-logo-nav.webp" alt="VYRO" width="300" height="156" decoding="async"></a><p>Fuel Beyond Limits.</p></div><div><h4>Explore</h4><a href="shop.html">Shop</a><a href="about.html">About</a><a href="contact.html">Contact</a></div><div><h4>Support</h4><a href="login.html">Login</a><a href="register.html">Register</a><a href="#">Shipping</a></div></div></footer>
  <div class="search-overlay"><button class="close-search"><i class="fa-solid fa-xmark"></i></button><input type="search" placeholder="Search VYRO flavors"></div><aside class="cart-drawer"></aside><div class="backdrop"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script><script src="https://cdn.jsdelivr.net/npm/lenis@1.3.17/dist/lenis.min.js"></script><script src="js/cart.js"></script><script src="js/main.js"></script><script src="js/animations.js"></script>
</body>
</html>
